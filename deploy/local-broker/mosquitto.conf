# AnkerMake M5C local MQTT broker — replaces make-mqtt.ankermake.com on the LAN.
# Installed to /opt/ankerm5c/mosquitto.conf by install.sh and run by the
# com.ankerm5c.mosquitto LaunchDaemon.
#
# TLS is self-signed (CN=make-mqtt.ankermake.com); the M5C's TLS is lax and
# accepts it without an Anker CA. allow_anonymous is safe only because the
# broker is reachable exclusively through the printer-only hotspot.

listener 8789
allow_anonymous true
require_certificate false

# Run as an unprivileged user (launchd starts the daemon as root). install.sh
# chowns the TLS key to this user so the privilege-dropped broker can read it.
user nobody

certfile /opt/ankerm5c/certs/server.crt
keyfile /opt/ankerm5c/certs/server.key

# Log to stdout only: the com.ankerm5c.mosquitto LaunchDaemon drops privileges
# to 'nobody', which cannot open a root-owned log file, but launchd captures
# stdout to /opt/ankerm5c/logs/mosquitto.out.log (opened as root).
log_type all
log_timestamp true
connection_messages true
log_dest stdout
