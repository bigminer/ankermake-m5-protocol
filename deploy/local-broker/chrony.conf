# Local NTP for the M5C hotspot. The printer syncs time at boot/intervals
# (observed querying time.nist.gov and pool.ntp.org); the anker_dns pf rule
# redirects its :123 here so its clock stays correct with the internet
# unplugged.
#
# chronyd runs with -x (see the LaunchDaemon), so it does NOT discipline the
# Mac's clock — macOS `timed` already does that. chrony only *serves* the Mac's
# system time to the printer. `local stratum 10` makes it a valid time source
# even when the Mac itself is offline, so fully-local operation keeps working.
allow 192.168.2.0/24
local stratum 10
driftfile /opt/ankerm5c/chrony.drift
# Runtime state must not survive a reboot. A persistent PID file can collide
# with an unrelated process that receives the same PID on the next boot,
# causing chronyd to reject every launch attempt.
pidfile /var/run/com.ankerm5c.chronyd.pid
