# AnkerMake M5C local DNS — answers Anker's MQTT hostname with the Mac (the
# broker), blackholes the rest of Anker/eufy, forwards everything else upstream.
# Runs on 127.0.0.1:5354; the pf rdr rule (anker_dns) sends the printer's :53
# queries here. Installed to /opt/ankerm5c/dnsmasq.conf, run by the
# com.ankerm5c.dnsmasq LaunchDaemon as `dnsmasq -k -C <this file>`.

port=5354
listen-address=127.0.0.1
bind-interfaces
no-resolv

# Point the printer's MQTT at the local broker (Mac = 192.168.2.1 on the hotspot).
address=/make-mqtt.ankermake.com/192.168.2.1
address=/make-mqtt-eu.ankermake.com/192.168.2.1

# Blackhole the remaining Anker / eufy cloud. The more-specific make-mqtt rules
# above win, so telemetry/control still resolves to the broker. The printer was
# observed querying all three domains: ankermake.com (make-app/make-mqtt),
# eufylife.com (p2p-mk-*, ota), and anker.com (www.anker.com).
address=/ankermake.com/0.0.0.0
address=/ankermake.com/::
address=/eufylife.com/0.0.0.0
address=/eufylife.com/::
address=/anker.com/0.0.0.0
address=/anker.com/::

# Upstream resolvers for everything else.
server=1.1.1.1
server=8.8.8.8
