name: Secret sweep

# Blocks any push or PR that introduces secrets or personal setup values.
on:
  push:
  pull_request:

jobs:
  secret-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for secrets and personal setup values
        run: bash scripts/check-secrets.sh
